<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Neon Portal</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at top, #0f0f1a, #000);
        font-family: "Arial", sans-serif;
        overflow: hidden;
        color: white;
    }

    /* glowing animated grid */
    body::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background-image: linear-gradient(#0ff2, transparent 1px),
                          linear-gradient(90deg, #ff00ff22, transparent 1px);
        background-size: 60px 60px;
        transform: rotate(25deg);
        animation: moveGrid 8s linear infinite;
        opacity: 0.3;
    }

    @keyframes moveGrid {
        from { transform: translateY(0) rotate(25deg); }
        to { transform: translateY(-60px) rotate(25deg); }
    }

    .container {
        text-align: center;
        z-index: 2;
    }

    h1 {
        font-size: 3rem;
        color: #00fff7;
        text-shadow: 0 0 10px #00fff7, 0 0 30px #00fff7;
        margin-bottom: 10px;
    }

    p {
        color: #bbb;
        margin-bottom: 30px;
    }

    .btn {
        display: inline-block;
        padding: 15px 40px;
        font-size: 1.2rem;
        color: #000;
        background: #00fff7;
        border-radius: 50px;
        text-decoration: none;
        font-weight: bold;
        box-shadow: 0 0 15px #00fff7, 0 0 40px #00fff7;
        transition: 0.3s;
    }

    .btn:hover {
        transform: scale(1.1);
        box-shadow: 0 0 25px #ff00ff, 0 0 60px #00fff7;
        background: #ff00ff;
    }

    .glow-dot {
        position: absolute;
        width: 10px;
        height: 10px;
        background: #00fff7;
        border-radius: 50%;
        box-shadow: 0 0 20px #00fff7;
        animation: float 6s infinite ease-in-out;
    }

    @keyframes float {
        0% { transform: translateY(0); }
        50% { transform: translateY(-40px); }
        100% { transform: translateY(0); }
    }
</style>
</head>

<body>

<!-- floating neon dots -->
<div class="glow-dot" style="top:20%; left:30%"></div>
<div class="glow-dot" style="top:60%; left:70%; animation-delay:2s"></div>
<div class="glow-dot" style="top:80%; left:20%; animation-delay:1s"></div>

<div class="container">
    <h1>NEON SYSTEM</h1>
    <p>Enter the cached universe</p>

    <a class="btn" href="caching.html">ENTER</a>
</div>

</body>
</html>
